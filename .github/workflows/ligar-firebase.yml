name: Ligar Firebase ao index
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inserir scripts Firebase
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          marker = '<!-- FIREBASE_CLOUD_LAYER -->'
          if marker not in s:
              inject = '''\n<!-- FIREBASE_CLOUD_LAYER -->\n<script src="firebase-config.js"></script>\n<script type="module" src="app-cloud.js"></script>\n'''
              s = s.replace('</body>', inject + '</body>')
              p.write_text(s, encoding='utf-8')
          PY
      - name: Guardar alteração
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Ligar camada Firebase ao index"
          git push
