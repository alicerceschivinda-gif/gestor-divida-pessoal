name: Ligar Firebase, QR e Drive ao index
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inserir scripts da aplicação
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          scripts = [
              '<script src="firebase-config.js"></script>',
              '<script type="module" src="app-cloud.js"></script>',
              '<script type="module" src="cloud-bridge.js?v=20260705-1"></script>',
              '<script src="qr-validation.js?v=20260705-3"></script>',
              '<script src="drive-upload.js?v=20260705-1"></script>'
          ]
          marker = '<!-- APP_INTEGRATION_LAYER -->'
          if marker not in s:
              old_marker = '<!-- FIREBASE_CLOUD_LAYER -->'
              inject = '\n' + marker + '\n' + '\n'.join(scripts) + '\n'
              if old_marker in s:
                  start = s.index(old_marker)
                  end = s.find('</body>', start)
                  s = s[:start] + inject + s[end:]
              else:
                  s = s.replace('</body>', inject + '</body>')
          else:
              for tag in scripts:
                  filename = tag.split('src="',1)[1].split('"',1)[0].split('?')[0]
                  if filename not in s:
                      s = s.replace('</body>', tag + '\n</body>')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Guardar alteração
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Ligar Firebase, QR e Google Drive ao index"
          git push
