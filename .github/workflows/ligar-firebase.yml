name: Ligar Firebase e QR ao index
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inserir scripts da aplicação
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          marker = '<!-- APP_INTEGRATION_LAYER -->'
          if marker not in s:
              inject = '''\n<!-- APP_INTEGRATION_LAYER -->\n<script src="firebase-config.js"></script>\n<script type="module" src="app-cloud.js"></script>\n<script src="qr-validation.js"></script>\n'''
              old_marker = '<!-- FIREBASE_CLOUD_LAYER -->'
              if old_marker in s:
                  start = s.index(old_marker)
                  end = s.find('</body>', start)
                  s = s[:start] + inject + s[end:]
              else:
                  s = s.replace('</body>', inject + '</body>')
              p.write_text(s, encoding='utf-8')
          elif 'qr-validation.js' not in s:
              s = s.replace('</body>', '<script src="qr-validation.js"></script>\n</body>')
              p.write_text(s, encoding='utf-8')
          PY
      - name: Guardar alteração
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Ligar camada Firebase e QR ao index"
          git push
