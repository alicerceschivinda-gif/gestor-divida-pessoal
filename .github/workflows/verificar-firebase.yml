name: Verificar integração Firebase
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar scripts Firebase no index
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          s=Path('index.html').read_text(encoding='utf-8')
          ok=('firebase-config.js' in s and 'app-cloud.js' in s)
          Path('firebase-integration-status.json').write_text(json.dumps({'firebase_scripts_linked': ok}, indent=2), encoding='utf-8')
          if not ok:
              raise SystemExit('Scripts Firebase não estão ligados ao index.html')
          PY
      - name: Guardar estado verificado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firebase-integration-status.json
          git commit -m "Registar estado verificado da integração Firebase" || exit 0
          git push
